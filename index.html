    <style>
        :root {
            --primary-color: #01b2ad;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { font-size: 24px; color: #222; margin-bottom: 5px; }
        .desc { font-size: 14px; color: #666; margin-bottom: 20px; }

        /* 비율 고정 프레임 */
        .map-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 900 / 630;
            background-image: url('map-bg.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border-radius: 16px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* 완전 투명하게 처리된 터치 영역 */
        .spot-trigger {
            position: absolute;
            width: 4.5%;
            height: 6.5%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background-color: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        /* 하단 감귤 스탬프 안착 레이어 */
        .stamp-layer {
            position: absolute;
            width: 7.5%;
            height: 10.5%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }
        .stamp-layer.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(-12deg);
        }

        /* 상세 정보 모달 구조 */
        .modal {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: white; padding: 24px; border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 320px;
            display: none; z-index: 100; opacity: 0; transition: all 0.3s;
            text-align: left;
            box-sizing: border-box;
        }
        .modal.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .modal h3 { margin: 0 0 5px 0; font-size: 20px; color: #111; border-bottom: 2px solid var(--primary-color); padding-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .modal-meta { font-size: 12px; color: var(--primary-color); font-weight: bold; margin-bottom: 12px; }
        .modal p { margin: 0 0 15px 0; font-size: 14px; color: #444; line-height: 1.5; white-space: pre-line; }
        
        /* 주소 및 연락처 정보 스타일 */
        .modal-info-box {
            background-color: #f8faf9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }
        .modal-info-box div {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        .modal-info-box div:last-child { margin-bottom: 0; }
        .modal-info-box span.label {
            font-weight: bold;
            color: #333;
            width: 50px;
            flex-shrink: 0;
        }
        
        /* 전화 걸기 버튼 스타일 */
        .phone-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--primary-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: auto;
            transition: all 0.2s;
        }
        .phone-link:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .modal-buttons { display: flex; gap: 8px; }
        .modal-btn {
            background: var(--primary-color); color: white; border: none;
            padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center;
        }
        .modal-close-btn {
            background: #eee; color: #444; border: none;
            padding: 12px; width: 35%; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center;
        }
        .reset-btn {
            margin-top: 20px; padding: 10px 20px; background: #fff; border: 1px solid #ccc;
            border-radius: 6px; cursor: pointer; font-weight: bold; color: #555;
        }
    </style>
</head>

            addr: '제주시 구좌읍 김녕로 93', tel: '0507-1339-4475'
        },
        '대복해장국': { 
            cat: '해장국 / 국밥', 
            desc: '이른 아침부터 뼈속까지 시원하고 칼칼한 육수로 속을 풀어주는 전형적인 로컬 해장 1번지 국밥집입니다.',
            addr: '제주시 구좌읍 김녕로 109', tel: '064-782-3588'
        },
        '모산봉': { 
            cat: '중국음식 / 식당', 
            desc: '김녕리 마을의 오랜 정취를 담아 깔끔하고 푸짐한 중화요리를 대접하는 정겨운 로컬 식당입니다.',
            addr: '제주시 구좌읍 김녕로 117', tel: '064-782-2544'
        },
        '김녕나루터': { 
            cat: '숯불구이 / 식당', 
            desc: '각종 숯불 구이 고기를 안주 삼아 바다 정취를 낭만적으로 즐기는 곳입니다.',
            addr: '제주시 구좌읍 김녕항해안길 150', tel: '064-784-9005'
        }
    };

    let currentTargetName = "";
    let currentStampCount = 0;
    const historyList = [];

    function openAuth(name) {
        currentTargetName = name;
        const info = storeData[name] || { cat: '매장', desc: '상세 정보 준비 중입니다.', addr: '정보 없음', tel: '' };
        
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalCategory').innerText = `[${info.cat}]`;
        document.getElementById('modalDesc').innerText = info.desc;
        document.getElementById('modalAddress').innerText = info.addr;
        
        const phoneBtn = document.getElementById('modalPhoneBtn');
        if (info.tel && info.tel.trim() !== '') {
            document.getElementById('modalPhone').innerText = info.tel;
            phoneBtn.setAttribute('href', `tel:${info.tel.replace(/[^0-9]/g, '')}`);
            phoneBtn.style.display = 'inline-flex';
        } else {
            document.getElementById('modalPhone').innerText = '등록 정보 없음 (방문 문의)';
            phoneBtn.style.display = 'none';
        }
        
        document.getElementById('authModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('authModal').classList.remove('show');
    }

    function collectStamp() {
        if (historyList.includes(currentTargetName)) {
            alert("이미 도장을 찍은 매장입니다.");
            return;
        }
        if (currentStampCount >= 5) {
            alert("이미 5개의 스탬프 투어를 모두 완료하셨습니다!");
            return;
        }

        historyList.push(currentTargetName);
        document.getElementById(`stamp${currentStampCount}`).classList.add('active');
        currentStampCount++;
        
        closeModal();
        setTimeout(() => {
            alert(`🍊 [${currentTargetName}] 정보 확인 및 감귤 스탬프 획득 성공!`);
        }, 300);
    }

    function resetTour() {
        currentStampCount = 0;
        historyList.length = 0;
        for (let i = 0; i < 5; i++) {
            document.getElementById(`stamp${i}`).classList.remove('active');
        }
        closeModal();
    }
</script>
</body>
</html>
