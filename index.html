<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>해녀마을 김녕리 골목상권 디지털 지도</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
    <style>
        :root {
            --sea: #01b2ad;
            --sea-dark: #017a76;
            --sea-light: #e6f7f6;
            --tangerine: #ff8c42;
            --tangerine-dark: #e06a1f;
            --paper: #fbf6ea;
            --ink: #1b2422;
            --ink-soft: #667572;
            --line: #e6ddc8;
            --bg: #eef3f1;
            --radius-lg: 22px;
            --radius-md: 12px;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 6% 12%, rgba(1,178,173,0.07) 0%, transparent 40%),
                radial-gradient(circle at 94% 88%, rgba(255,140,66,0.08) 0%, transparent 40%);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            touch-action: pan-x pan-y;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            padding: 22px 16px 32px;
            box-sizing: border-box;
            text-align: center;
        }

        /* ===== 여권 스탬프 컨셉 히어로 ===== */
        .passport-hero {
            margin-bottom: 20px;
        }
        .passport-frame {
            position: relative;
            background-color: var(--paper);
            background-image:
                repeating-linear-gradient(135deg, rgba(1,178,173,0.035) 0px, rgba(1,178,173,0.035) 1px, transparent 1px, transparent 14px);
            border: 1.5px dashed var(--sea);
            border-radius: var(--radius-lg);
            padding: 26px 22px 22px;
            box-shadow: 0 10px 26px rgba(1, 178, 173, 0.10);
        }
        .corner-stamp {
            position: absolute;
            top: -18px;
            right: 16px;
            width: 66px;
            height: 66px;
            border-radius: 50%;
            border: 2px solid var(--tangerine);
            background: rgba(255, 255, 255, 0.92);
            transform: rotate(-13deg);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.15;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.4px;
            color: var(--tangerine-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .passport-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 14px;
        }
        .passport-eyebrow {
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 1.4px;
            color: var(--sea-dark);
            background: var(--sea-light);
            padding: 5px 10px;
            border-radius: 30px;
        }
        .passport-serial {
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--ink-soft);
            font-variant-numeric: tabular-nums;
        }
        .passport-frame h1 {
            font-family: 'Gowun Batang', serif;
            font-size: 23px;
            font-weight: 700;
            line-height: 1.35;
            margin: 0 0 10px 0;
            color: var(--ink);
            letter-spacing: -0.2px;
        }
        .passport-desc {
            font-size: 13.5px;
            color: var(--ink-soft);
            line-height: 1.6;
            margin: 0;
            font-weight: 500;
        }

        .stamp-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px dashed var(--line);
            flex-wrap: wrap;
        }
        .stamp-slot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px dashed var(--line);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            opacity: 0.32;
            transform: scale(0.92);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stamp-slot.filled {
            opacity: 1;
            transform: scale(1) rotate(-8deg);
            border-style: solid;
            border-color: var(--tangerine);
            background: #fff6ec;
            box-shadow: 0 3px 8px rgba(255, 140, 66, 0.25);
        }
        .stamp-count {
            margin-left: 6px;
            font-size: 12.5px;
            font-weight: 700;
            color: var(--ink-soft);
            white-space: nowrap;
        }
        .stamp-count strong {
            font-size: 16px;
            color: var(--tangerine-dark);
        }

        /* ===== 지도 (카카오톡 인앱 브라우저 호환: padding-bottom 방식) ===== */
        .map-wrap {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 70%; /* 900:630 비율 */
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            background-color: #fff;
        }
        .map-zoom-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            will-change: transform;
        }
        .map-bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-image: url('map-bg.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .map-caption {
            font-size: 11.5px;
            color: var(--ink-soft);
            margin-top: 10px;
            font-weight: 600;
            opacity: 0.75;
        }

        .zoom-reset-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 30;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10.5px;
            font-weight: 800;
            color: var(--ink-soft);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .zoom-reset-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .spot-trigger {
            position: absolute;
            width: 4.5%;
            height: 6.5%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background-color: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .stamp-layer {
            position: absolute;
            width: 7.5%;
            height: 10.5%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            pointer-events: none;
            opacity: 0;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            z-index: 20;
        }
        .stamp-layer.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(-12deg);
        }

        /* ===== 모달 ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 26, 24, 0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: white;
            padding: 26px 26px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: left;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .modal-overlay.show .modal {
            transform: translateY(0);
        }

        .modal-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--sea-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .modal h3 {
            margin: 0 0 6px 0;
            font-size: 21px;
            font-weight: 700;
            color: var(--ink);
        }
        .modal-meta {
            font-size: 12.5px;
            color: var(--sea-dark);
            font-weight: 700;
            background-color: var(--sea-light);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            margin-bottom: 16px;
        }
        .modal p {
            margin: 0 0 20px 0;
            font-size: 13.5px;
            color: var(--ink-soft);
            line-height: 1.65;
            white-space: pre-line;
        }

        .modal-info-box {
            background-color: #f7faf9;
            padding: 15px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 22px;
            font-size: 13px;
            color: #4a5251;
            border: 1px solid #eef2f1;
        }
        .modal-info-box div {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .modal-info-box div:last-child { margin-bottom: 0; }
        .modal-info-box span.label {
            font-weight: 700;
            color: var(--ink);
            width: 50px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .modal-info-box span.val {
            line-height: 1.4;
        }

        .phone-link {
            display: inline-flex;
            align-items: center;
            color: var(--sea-dark);
            text-decoration: none;
            font-weight: 700;
            background: #fff;
            border: 1px solid #d6efed;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            margin-left: auto;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .phone-link:active {
            background-color: var(--sea);
            color: white;
            border-color: var(--sea);
        }

        .modal-buttons { display: flex; gap: 10px; }
        .modal-btn {
            background: var(--sea);
            color: white;
            border: none;
            padding: 14px;
            width: 65%;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(1, 178, 173, 0.25);
            transition: background 0.2s;
        }
        .modal-btn:active { background: var(--sea-dark); }
        .modal-close-btn {
            background: #f0f3f2;
            color: var(--ink-soft);
            border: none;
            padding: 14px;
            width: 35%;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: background 0.2s;
        }
        .modal-close-btn:active { background: #e2e7e6; }

        .reset-btn {
            margin-top: 22px;
            padding: 12px 22px;
            background: transparent;
            border: 1.5px dashed var(--line);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            color: var(--ink-soft);
            font-size: 12.5px;
            letter-spacing: 0.2px;
            transition: all 0.2s;
        }
        .reset-btn:active { background: #fff; color: var(--ink); border-color: var(--sea); }

        @media (max-width: 540px) {
            .modal-overlay {
                align-items: flex-end;
                padding: 0;
            }
            .modal {
                max-width: 100%;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                transform: translateY(100%);
                padding: 32px 20px calc(22px + env(safe-area-inset-bottom)) 20px;
            }
            .modal::before {
                content: '';
                position: absolute;
                top: 12px; left: 50%;
                transform: translateX(-50%);
                width: 40px; height: 5px;
                background-color: #e2e7e6;
                border-radius: 3px;
            }
        }
    </style>
</head>

    let currentTargetName = "";
    let currentStampCount = 0;

    // ===== 지도 전용 핀치 줌 / 팬 (페이지 전체 확대와는 분리) =====
    (function initMapZoom() {
        const wrap = document.getElementById('mapWrap');
        const layer = document.getElementById('mapZoomLayer');
        const zoomBtn = document.getElementById('zoomResetBtn');
        const MIN_SCALE = 1;
        const MAX_SCALE = 3.5;

        let scale = 1, tx = 0, ty = 0;
        let mode = null; // 'pinch' | 'pan'
        let moved = false;
        let suppressClick = false;

        let pinch = null; // {startDist, startScale, contentX, contentY, rectLeft, rectTop}
        let pan = null;   // {startX, startY, startTx, startTy}

        let lastTapTime = 0, lastTapPos = null;

        function applyTransform() {
            layer.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        }

        function clampPan() {
            const rect = wrap.getBoundingClientRect();
            if (scale <= 1) { tx = 0; ty = 0; return; }
            const minX = rect.width - rect.width * scale;
            const minY = rect.height - rect.height * scale;
            tx = Math.min(0, Math.max(minX, tx));
            ty = Math.min(0, Math.max(minY, ty));
        }

        function updateZoomBtn() {
            zoomBtn.classList.toggle('visible', scale > 1.02);
        }

        function dist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
        function mid(p1, p2) { return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 }; }

        function pointFromTouch(t) { return { x: t.clientX, y: t.clientY }; }

        window.resetZoom = function () {
            layer.style.transition = 'transform 0.3s ease';
            scale = 1; tx = 0; ty = 0;
            applyTransform();
            updateZoomBtn();
            setTimeout(() => { layer.style.transition = ''; }, 300);
        };

        function toggleZoom(clientX, clientY) {
            const rect = wrap.getBoundingClientRect();
            layer.style.transition = 'transform 0.3s ease';
            if (scale > 1.02) {
                scale = 1; tx = 0; ty = 0;
            } else {
                const targetScale = 2.2;
                const mx = clientX - rect.left;
                const my = clientY - rect.top;
                const contentX = (mx - tx) / scale;
                const contentY = (my - ty) / scale;
                scale = targetScale;
                tx = mx - scale * contentX;
                ty = my - scale * contentY;
                clampPan();
            }
            applyTransform();
            updateZoomBtn();
            setTimeout(() => { layer.style.transition = ''; }, 300);
        }

        wrap.addEventListener('touchstart', (e) => {
            moved = false;
            layer.style.transition = '';

            if (e.touches.length === 2) {
                mode = 'pinch';
                const rect = wrap.getBoundingClientRect();
                const p1 = pointFromTouch(e.touches[0]);
                const p2 = pointFromTouch(e.touches[1]);
                const m0 = mid(p1, p2);
                const mx0 = m0.x - rect.left;
                const my0 = m0.y - rect.top;
                pinch = {
                    startDist: dist(p1, p2),
                    startScale: scale,
                    contentX: (mx0 - tx) / scale,
                    contentY: (my0 - ty) / scale,
                    rectLeft: rect.left,
                    rectTop: rect.top
                };
            } else if (e.touches.length === 1) {
                const t = e.touches[0];
                mode = scale > 1.02 ? 'pan' : 'tap';
                pan = { startX: t.clientX, startY: t.clientY, startTx: tx, startTy: ty };

                const now = Date.now();
                if (lastTapPos && now - lastTapTime < 320 &&
                    Math.hypot(t.clientX - lastTapPos.x, t.clientY - lastTapPos.y) < 30) {
                    toggleZoom(t.clientX, t.clientY);
                    lastTapTime = 0;
                    lastTapPos = null;
                } else {
                    lastTapTime = now;
                    lastTapPos = { x: t.clientX, y: t.clientY };
                }
            }
        }, { passive: true });

        wrap.addEventListener('touchmove', (e) => {
            if (mode === 'pinch' && e.touches.length === 2 && pinch) {
                e.preventDefault();
                const p1 = pointFromTouch(e.touches[0]);
                const p2 = pointFromTouch(e.touches[1]);
                const d = dist(p1, p2);
                let newScale = pinch.startScale * (d / pinch.startDist);
                newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
                const m = mid(p1, p2);
                const mx = m.x - pinch.rectLeft;
                const my = m.y - pinch.rectTop;
                scale = newScale;
                tx = mx - scale * pinch.contentX;
                ty = my - scale * pinch.contentY;
                clampPan();
                applyTransform();
                updateZoomBtn();
                moved = true;
            } else if (mode === 'pan' && e.touches.length === 1 && pan) {
                const t = e.touches[0];
                const dx = t.clientX - pan.startX;
                const dy = t.clientY - pan.startY;
                if (Math.hypot(dx, dy) > 6) {
                    e.preventDefault();
                    moved = true;
                    tx = pan.startTx + dx;
                    ty = pan.startTy + dy;
                    clampPan();
                    applyTransform();
                }
            }
        }, { passive: false });

        wrap.addEventListener('touchend', () => {
            if (moved) {
                suppressClick = true;
                setTimeout(() => { suppressClick = false; }, 300);
            }
            mode = null; pinch = null; pan = null;
        });

        // 드래그/핀치 직후 발생하는 의도치 않은 매장 클릭 방지 (캡처 단계에서 차단)
        wrap.addEventListener('click', (e) => {
            if (suppressClick) {
                e.stopPropagation();
                e.preventDefault();
            }
        }, true);
    })();

    function openAuth(name) {
        currentTargetName = name;
        const info = storeData[name] || { cat: '매장', desc: '상세 정보 준비 중입니다.', addr: '정보 없음', tel: '' };

        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalCategory').innerText = info.cat;
        document.getElementById('modalDesc').innerText = info.desc;
        document.getElementById('modalAddress').innerText = info.addr;

        const phoneBtn = document.getElementById('modalPhoneBtn');
        if (info.tel && info.tel.trim() !== '') {
            document.getElementById('modalPhone').innerText = info.tel;
            phoneBtn.setAttribute('href', `tel:${info.tel.replace(/[^0-9]/g, '')}`);
            phoneBtn.style.display = 'inline-flex';
        } else {
            document.getElementById('modalPhone').innerText = '등록 정보 없음';
            phoneBtn.style.display = 'none';
        }

        document.getElementById('modalOverlay').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
        document.body.style.overflow = '';
    }

    function closeModalOnBg(e) {
        if (e.target.id === 'modalOverlay') {
            closeModal();
        }
    }

    function updateStampUI() {
        const slots = document.querySelectorAll('.stamp-slot');
        slots.forEach((slot, idx) => {
            slot.classList.toggle('filled', idx < currentStampCount);
        });
        document.getElementById('stampCountNum').innerText = currentStampCount;
    }

    function collectStamp() {
        if (historyList.includes(currentTargetName)) {
            alert("이미 도장을 찍은 매장입니다.");
            return;
        }
        if (currentStampCount >= 5) {
            alert("이미 5개의 스탬프 투어를 모두 완료하셨습니다!");
            return;
        }

        historyList.push(currentTargetName);
        document.getElementById(`stamp${currentStampCount}`).classList.add('active');
        currentStampCount++;
        updateStampUI();

        closeModal();
        setTimeout(() => {
            alert(`🍊 [${currentTargetName}] 골목상권 스탬프 투어 도장 완료!`);
        }, 300);
    }

    function resetTour() {
        if (!confirm("스탬프 투어 기록을 초기화하시겠습니까?")) return;
        currentStampCount = 0;
        historyList.length = 0;
        for (let i = 0; i < 5; i++) {
            document.getElementById(`stamp${i}`).classList.remove('active');
        }
        updateStampUI();
        closeModal();
    }
