<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해녀마을 김녕리 골목상권 디지털 지도</title>
    <style>
        :root {
            --primary-color: #01b2ad;
            --primary-light: #e6f7f6;
            --text-dark: #1a1f1e;
            --text-gray: #656e6d;
            --bg-light: #f8faf9;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f5f4;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            padding: 24px 16px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 헤더 디자인 개선 */
        header {
            margin-bottom: 24px;
        }
        h1 { 
            font-size: 26px; 
            font-weight: 800;
            color: var(--text-dark); 
            margin: 0 0 8px 0; 
            letter-spacing: -0.5px;
        }
        .desc { 
            font-size: 14px; 
            color: var(--text-gray); 
            margin: 0;
            font-weight: 500;
        }

        /* 지도 프레임 레이아웃 */
        .map-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 900 / 630;
            background-image: url('map-bg.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            background-color: #fff;
        }

        /* 완전히 투명한 터치 영역 */
        .spot-trigger {
            position: absolute;
            width: 4.5%;
            height: 6.5%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background-color: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        /* 감귤 스탬프 안착 레이어 */
        .stamp-layer {
            position: absolute;
            width: 7.5%;
            height: 10.5%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            pointer-events: none;
            opacity: 0;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            z-index: 20;
        }
        .stamp-layer.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(-12deg);
        }

        /* 모달 전체 화면 덮는 흐린 배경 (모바일 이슈 해결의 핵심) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        /* 정보창(모달) 반응형 UI 스타일링 */
        .modal {
            background: white; 
            padding: 28px; 
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); 
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: left;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.show .modal {
            transform: translateY(0);
        }

        .modal h3 { 
            margin: 0 0 6px 0; 
            font-size: 22px; 
            font-weight: 700;
            color: var(--text-dark); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        .modal-meta { 
            font-size: 13px; 
            color: var(--primary-color); 
            font-weight: 600; 
            background-color: var(--primary-light);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            margin-bottom: 16px; 
        }
        .modal p { 
            margin: 0 0 20px 0; 
            font-size: 14px; 
            color: var(--text-gray); 
            line-height: 1.6; 
            white-space: pre-line; 
        }
        
        /* 주소 및 연락처 정보 박스 */
        .modal-info-box {
            background-color: var(--bg-light);
            padding: 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            font-size: 13px;
            color: #4a5251;
            border: 1px solid #eef2f1;
        }
        .modal-info-box div {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .modal-info-box div:last-child { margin-bottom: 0; }
        .modal-info-box span.label {
            font-weight: 700;
            color: var(--text-dark);
            width: 50px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .modal-info-box span.val {
            line-height: 1.4;
        }
        
        /* 전화 걸기 버튼 */
        .phone-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            background: #fff;
            border: 1px solid #dceffd;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            margin-left: auto;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .phone-link:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 하단 버튼 구조 */
        .modal-buttons { display: flex; gap: 10px; }
        .modal-btn {
            background: var(--primary-color); color: white; border: none;
            padding: 14px; width: 65%; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; text-align: center;
            font-size: 14px; box-shadow: 0 4px 12px rgba(1, 178, 173, 0.2); transition: background 0.2s;
        }
        .modal-btn:hover { background: #009d99; }
        .modal-close-btn {
            background: #f0f3f2; color: var(--text-gray); border: none;
            padding: 14px; width: 35%; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; text-align: center;
            font-size: 14px; transition: background 0.2s;
        }
        .modal-close-btn:hover { background: #e2e7e6; }

        /* 초기화 버튼 세련되게 변경 */
        .reset-btn {
            margin-top: 24px; padding: 12px 24px; background: #fff; border: 1px solid #e2e7e6;
            border-radius: 30px; cursor: pointer; font-weight: 600; color: var(--text-gray); font-size: 13px;
            box-shadow: var(--shadow-sm); transition: all 0.2s;
        }
        .reset-btn:hover { background: #fafafa; color: var(--text-dark); border-color: #ccd4d3; }

        /* 모바일 세로 화면을 위한 미디어 쿼리 (바텀 시트 전환 기술) */
        @media (max-width: 540px) {
            .modal-overlay {
                align-items: flex-end; /* 아래 정렬 */
            }
            .modal {
                max-width: 100%;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0; /* 위쪽만 라운딩 */
                transform: translateY(100%); /* 아래서 위로 올라오는 효과 */
                padding: 32px 20px 24px 20px;
            }
            /* 상단 바텀시트 핸들러 표시 */
            .modal::before {
                content: '';
                position: absolute;
                top: 12px; left: 50%;
                transform: translateX(-50%);
                width: 40px; height: 5px;
                background-color: #e2e7e6;
                border-radius: 3px;
            }
        }
    </style>
</head>

    let currentTargetName = "";
    let currentStampCount = 0;
    const historyList = [];

    function openAuth(name) {
        currentTargetName = name;
        const info = storeData[name] || { cat: '매장', desc: '상세 정보 준비 중입니다.', addr: '정보 없음', tel: '' };
        
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalCategory').innerText = info.cat;
        document.getElementById('modalDesc').innerText = info.desc;
        document.getElementById('modalAddress').innerText = info.addr;
        
        const phoneBtn = document.getElementById('modalPhoneBtn');
        if (info.tel && info.tel.trim() !== '') {
            document.getElementById('modalPhone').innerText = info.tel;
            phoneBtn.setAttribute('href', `tel:${info.tel.replace(/[^0-9]/g, '')}`);
            phoneBtn.style.display = 'inline-flex';
        } else {
            document.getElementById('modalPhone').innerText = '등록 정보 없음';
            phoneBtn.style.display = 'none';
        }
        
        document.getElementById('modalOverlay').classList.add('show');
        document.body.style.overflow = 'hidden'; // 정보창 열릴 때 뒷배경 스크롤 방지
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
        document.body.style.overflow = ''; // 스크롤 복구
    }

    // 모달창 바깥 검은 배경 터치시 닫기 기능
    function closeModalOnBg(e) {
        if (e.target.id === 'modalOverlay') {
            closeModal();
        }
    }

    function collectStamp() {
        if (historyList.includes(currentTargetName)) {
            alert("이미 도장을 찍은 매장입니다.");
            return;
        }
        if (currentStampCount >= 5) {
            alert("이미 5개의 스탬프 투어를 모두 완료하셨습니다!");
            return;
        }

        historyList.push(currentTargetName);
        document.getElementById(`stamp${currentStampCount}`).classList.add('active');
        currentStampCount++;
        
        closeModal();
        setTimeout(() => {
            alert(`🍊 [${currentTargetName}] 골목상권 스탬프 투어 도장 완료!`);
        }, 300);
    }

    function resetTour() {
        if (!confirm("스탬프 투어 기록을 초기화하시겠습니까?")) return;
        currentStampCount = 0;
        historyList.length = 0;
        for (let i = 0; i < 5; i++) {
            document.getElementById(`stamp${i}`).classList.remove('active');
        }
        closeModal();
    }
</script>
